version: 2

updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    target-branch: "main"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "dependabot"
      - "gomod"
    commit-message:
      prefix: "deps(gomod): "
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "America/New_York"
    target-branch: "main"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "dependabot"
      - "github-actions"
    commit-message:
      prefix: "deps(github-actions): "
    groups:
      github-actions:
        patterns:
          - "*"
