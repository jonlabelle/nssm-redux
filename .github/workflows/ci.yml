name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@main

      - name: Set up Go
        uses: actions/setup-go@main
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Check formatting
        shell: bash
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "These files need gofmt:"
            echo "$files"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -race ./...

  build:
    name: Build Windows (${{ matrix.goarch }})
    needs: test
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        goarch:
          - amd64
          - arm64

    steps:
      - name: Check out code
        uses: actions/checkout@main

      - name: Set up Go
        uses: actions/setup-go@main
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go run ./internal/tools/winbuild -source ./cmd/nssmr -out "dist/nssmr-windows-${{ matrix.goarch }}.exe" -arch ${{ matrix.goarch }} -version "${env:GITHUB_SHA}" -versioninfo ./build/windows-versioninfo.json

      - name: Upload build artifact
        uses: actions/upload-artifact@main
        with:
          name: nssmr-windows-${{ matrix.goarch }}
          path: dist/nssmr-windows-${{ matrix.goarch }}.exe
