name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Release Windows (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch:
          - amd64
          - arm64

    steps:
      - name: Check out code
        uses: actions/checkout@main

      - name: Set up Go
        uses: actions/setup-go@main
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binary
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p "dist/package/nssmr-windows-${GOARCH}"
          go build -trimpath -ldflags "-s -w -X github.com/jonlabelle/nssm-redux/internal/cli.Version=${GITHUB_REF_NAME}" -o "dist/package/nssmr-windows-${GOARCH}/nssmr.exe" ./cmd/nssmr
          cp README.md LICENSE "dist/package/nssmr-windows-${GOARCH}/"
          cd dist/package
          zip -r "../nssmr-windows-${GOARCH}.zip" "nssmr-windows-${GOARCH}"

      - name: Upload release artifact
        uses: actions/upload-artifact@main
        with:
          name: nssmr-windows-${{ matrix.goarch }}
          path: dist/nssmr-windows-${{ matrix.goarch }}.zip

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@main
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum *.zip > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
