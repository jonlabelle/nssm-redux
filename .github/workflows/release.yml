name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Release Windows (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch:
          - amd64
          - arm64

    steps:
      - name: Check out code
        uses: actions/checkout@main

      - name: Set up Go
        uses: actions/setup-go@main
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binary
        run: |
          mkdir -p "dist/package/nssmr-windows-${{ matrix.goarch }}"
          go run ./internal/tools/winbuild -source ./cmd/nssmr -out "dist/package/nssmr-windows-${{ matrix.goarch }}/nssmr.exe" -arch ${{ matrix.goarch }} -version "${GITHUB_REF_NAME}" -versioninfo ./build/windows-versioninfo.json
          cp README.md LICENSE "dist/package/nssmr-windows-${{ matrix.goarch }}/"
          cd dist/package
          zip -r "../nssmr-windows-${{ matrix.goarch }}.zip" "nssmr-windows-${{ matrix.goarch }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@main
        with:
          name: nssmr-windows-${{ matrix.goarch }}
          path: dist/nssmr-windows-${{ matrix.goarch }}.zip

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@main
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum *.zip > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
